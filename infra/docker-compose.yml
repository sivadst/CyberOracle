# ══════════════════════════════════════
# CyberOracle — Docker Compose Stack
# ══════════════════════════════════════

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: cyberoracle-db
    environment:
      POSTGRES_USER: cyberoracle
      POSTGRES_PASSWORD: cyberoracle_secret
      POSTGRES_DB: cyberoracle
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberoracle"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cyberoracle-net

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: cyberoracle-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cyberoracle-net

  # ── Backend API ──
  backend:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.backend
    container_name: cyberoracle-api
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://cyberoracle:cyberoracle_secret@postgres:5432/cyberoracle
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/2
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cyberoracle-net
    restart: unless-stopped

  # ── Celery Worker ──
  celery-worker:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.worker
    container_name: cyberoracle-worker
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://cyberoracle:cyberoracle_secret@postgres:5432/cyberoracle
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/2
      CELERY_RESULT_BACKEND: redis://redis:6379/3
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cyberoracle-net
    restart: unless-stopped

  # ── Celery Beat ──
  celery-beat:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.worker
    container_name: cyberoracle-beat
    command: celery -A workers.celery_app beat --loglevel=info
    env_file:
      - .env.example
    environment:
      CELERY_BROKER_URL: redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cyberoracle-net
    restart: unless-stopped

  # ── Frontend Next.js ──
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: cyberoracle-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    networks:
      - cyberoracle-net
    restart: unless-stopped

  # ── Nginx ──
  nginx:
    image: nginx:alpine
    container_name: cyberoracle-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - cyberoracle-net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  cyberoracle-net:
    driver: bridge
